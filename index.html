<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streaming Service</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,Helvetica,sans-serif;
    background:#000;
    color:#fff;
}

header{
    padding:20px;
    text-align:center;
    border-bottom:1px solid #222;
}

.logo{
    width:180px;
    height:auto;
}

.container{
    max-width:520px;
    margin:40px auto;
    background:#1a1a1a;
    border:1px solid #333;
    border-radius:10px;
    padding:30px;
}

h1{
    margin-bottom:15px;
}

p{
    color:#b5b5b5;
    line-height:1.6;
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:15px;
    font-weight:bold;
}

input,
select{
    width:100%;
    height:45px;
    margin-top:6px;
    padding:10px;
    border-radius:8px;
    border:1px solid #444;
    background:#111;
    color:#fff;
}

button{
    width:100%;
    height:46px;
    border:none;
    border-radius:25px;
    background:#137ed5;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}
</style>

</head>
<body>

<header>
    <!-- Replace logo.png with your own image -->
    <img src="logop.png" alt="pm Logo" class="logo">
</header>

<div class="container">
    <h1>Billing Information</h1>

    <p>Please verify your billing information to continue using our service.</p>

    <label>
        Mobile Number
        <input type="text" placeholder="Enter mobile number">
    </label>

    <label>
        Country
        <select>
            <option>United States</option>
            <option>Canada</option>
            <option>United Kingdom</option>
        </select>
    </label>

    <button>Continue</button>
</div>

</body>
</html>
